name: WorkFlow Pro QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full regression + BrowserStack run, outside business hours.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.11"

jobs:
  smoke:
    name: Smoke Suite (PR gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run smoke suite
        env:
          QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_USERNAME: ${{ secrets.QA_USERNAME }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_TENANT_ID: ${{ secrets.QA_TENANT_ID }}
          QA_TENANT_NAME: ${{ secrets.QA_TENANT_NAME }}

          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          pytest -m smoke -n auto \
            --html=reports/html/report.html --self-contained-html \
            --alluredir=reports/allure-results

      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: reports/

  regression:
    name: Regression Suite (post-merge)
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run API + UI regression suite (Chromium + Firefox, headless)
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_2FA_SECRET: ${{ secrets.TEST_USER_2FA_SECRET }}
          WORKFLOWPRO_API_BASE_URL: ${{ secrets.WORKFLOWPRO_API_BASE_URL }}
        run: |
          pytest -m "regression and not mobile" -n auto \
            --html=reports/html/report.html --self-contained-html \
            --alluredir=reports/allure-results

      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-reports
          path: reports/

  nightly:
    name: Nightly Full Regression + BrowserStack
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run full suite (including mobile/BrowserStack)
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_2FA_SECRET: ${{ secrets.TEST_USER_2FA_SECRET }}
          WORKFLOWPRO_API_BASE_URL: ${{ secrets.WORKFLOWPRO_API_BASE_URL }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          pytest -n auto \
            --html=reports/html/report.html --self-contained-html \
            --alluredir=reports/allure-results

      - name: Upload nightly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: reports/
