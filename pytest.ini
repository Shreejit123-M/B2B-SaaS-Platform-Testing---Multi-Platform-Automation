[pytest]
minversion = 7.0
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery patterns
testpaths = tests

# Markers for test categorization
markers =
    smoke: Smoke tests for critical paths
    critical: Critical functionality tests
    regression: Regression test suite
    integration: Integration tests
    api: API tests
    web: Web UI tests
    ui: UI tests
    mobile: Mobile-specific tests
    multi_tenant: Multi-tenant isolation tests
    slow: Slow-running tests
    flaky: Known flaky tests
    parametrize: Parametrized tests
    cross_platform: Cross-platform tests
    security: Security tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --capture=sys
    -ra

# Timeout for tests (in seconds)
timeout = 300
timeout_method = thread

# HTML Report
html = reports/report.html
self_contained_html = true

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(funcName)s() - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Trace options (Playwright)
trace = 

# Allure reporting
allure_features_id = true
allure_epics_id = true
